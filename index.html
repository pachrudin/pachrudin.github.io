<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOS_Family</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 15px;
}
.container { max-width: 500px; margin: auto; }
.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
}
label {
    margin-top: 10px;
    display: block;
    font-weight: bold;
    color: #94a3b8;
}
input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 10px;
    border: none;
}
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}
.tambah { background: #22c55e; }
.update { background: #f59e0b; }
.hapus { background: #ef4444; }
.edit { background: #facc15; color:black; }

.data {
    background: #334155;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
}
.total {
    font-size: 18px;
    margin-top: 10px;
    color: #22c55e;
    font-weight: bold;
}

/* OVERLAY */
#tentangOverlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.3s;
}

#tentangBox {
    width: 90%;
    max-width: 400px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px;
    border-radius: 20px;

    /* BACKGROUND PUTIH + GRADIENT HALUS */
    background: linear-gradient(180deg, #ffffff, #f1f5f9);

    color: #0f172a; /* teks jadi gelap biar kebaca */

    animation: slideUp 0.3s;
    position: relative;
}

    #tentangBox h3, 
#tentangBox h4 {
    color: #0f172a;
}

#tentangBox p, 
#tentangBox li {
    color: #334155;
}
    
/* SCROLLBAR KEREN */
#tentangBox::-webkit-scrollbar {
    width: 5px;
}

#tentangBox::-webkit-scrollbar-thumb {
    background: #64748b;
    border-radius: 10px;
}
    #tentangBox {
    padding-bottom: 40px;
    }
/* ANIMASI */
@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

@keyframes slideUp {
    from {transform: translateY(50px); opacity:0;}
    to {transform: translateY(0); opacity:1;}
}
/* TOMBOL TENTANG PREMIUM */
.tentangBtn {
    width: 60%;
    margin: 10px auto 0;
    display: block;
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    color: white;
    font-size: 14px;
    padding: 8px;
    border-radius: 999px;
    box-shadow: 0 4px 15px rgba(99,102,241,0.4);
}

/* HOVER EFFECT */
.tentangBtn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 20px rgba(56,189,248,0.6);
}

/* KLIK EFFECT */
.tentangBtn:active {
    transform: scale(0.95);
}

    .qrisBox {
    text-align: center;
    margin-top: 10px;
}

.qrisBox img {
    width: 180px;
    max-width: 80%;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    margin-bottom: 10px;
}

/* tombol bawah QR */
.qrisBtnWrap {
    display: flex;
    gap: 10px;
    justify-content: center;
}

.qrisBtnWrap button {
    width: auto;
    padding: 8px 12px;
    font-size: 13px;
    border-radius: 10px;
    background: #334155;
}

    .closeBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: #e2e8f0;
    color: #0f172a;
    font-size: 16px;
    font-weight: bold;
    border: none;
}

.closeBtn:hover {
    background: #cbd5f5;
    transform: scale(1.1);
}
    
</style>
</head>

<body>

<div class="container">

<h2>📊 SOS Family Euy🗿</h2>

<div class="card" id="formInput">
<h3>📥 Input Data Harian</h3>

<label>📅 Tanggal</label>
<input type="date" id="tanggal">

<label>👥 Jumlah MPP</label>
<input type="number" id="mpp">

<label>🎯 Target</label>
<input type="number" id="target">

<label>📊 ACV</label>
<input type="number" id="hasil">

<label>📝 Nama MPP</label>
<textarea id="nama"></textarea>

<button id="btnTambah" class="tambah" onclick="tambahData()">Tambah Data</button>
<button id="btnUpdate" class="update" onclick="updateData()" style="display:none;">Update Data</button>
</div>

<div class="card">
<h3>📅 Rekap Harian</h3>
<div id="listData"></div>

<div class="total" id="totalSemua"></div>
<div class="total" id="totalHari"></div>

<button class="hapus" onclick="resetData()">Bersihkan Semua</button>

<hr>

<button onclick="exportTXT()">Export TXT</button>
<button onclick="exportCSV()">Export CSV</button>
<button onclick="exportExcel()">Export Excel</button>
<button onclick="exportPDF()">Export PDF</button>
<button onclick="kirimWA()">Kirim ke WhatsApp</button>
    <button class="tentangBtn" onclick="toggleTentang()">ℹ️ Tentang</button>
</div>

<div id="tentangBox">

<button class="closeBtn" onclick="toggleTentang()">✖</button>

<h3>👤 Tentang Saya</h3>

        <p><b>Hanuma Amruhu</b></p>
        <p>Owner - Majalengka Flasher</p>

        <hr>

        <h4>🛠️ Layanan</h4>
        <ul>
            <li>Perbaikan Ponsel</li>
            <li>Project Elektronik</li>
            <li>Pembuatan Website</li>
            <li>Pembuatan Aplikasi</li>
        </ul>

        <hr>

        <h4>💰 Donasi</h4>

<div class="qrisBox">
    <img id="qrisImg" src="qris.png">
    
    <div class="qrisBtnWrap">
        <button onclick="downloadQRIS()">⬇️ Download</button>
        <button onclick="shareQRIS()">📤 Bagikan</button>
    </div>
</div>

<p>DANA: 08xxxxxxxxxx</p>
</div>
</div>

<script>

    // DOWNLOAD QRIS
function downloadQRIS(){
    let link = document.createElement("a");
    link.href = document.getElementById("qrisImg").src;
    link.download = "QRIS_Hanuma.png";
    link.click();
}

// SHARE QRIS
function shareQRIS(){
    let url = document.getElementById("qrisImg").src;

    if(navigator.share){
        navigator.share({
            title: "QRIS Hanuma",
            text: "Scan untuk donasi 🙏",
            url: url
        });
    } else {
        // fallback ke WhatsApp
        let text = "Scan QRIS ini untuk donasi 🙏\n" + url;
        window.open("https://wa.me/?text=" + encodeURIComponent(text));
    }
}

    function toggleTentang(){
    let overlay = document.getElementById("tentangOverlay");

    if(overlay.style.display === "none"){
        overlay.style.display = "flex";
    } else {
        overlay.style.display = "none";
    }
}

function hubungiWA(){
    let text = "Halo, saya tertarik dengan jasa Anda";
    window.open("https://wa.me/628xxxxxxxxxx?text="+encodeURIComponent(text));
}

    
const hargaPerCB = 1100;
let data = [];
let editIndex = null;

function loadData(){
    data = JSON.parse(localStorage.getItem("pieceData")) || [];
}
function saveData(){
    localStorage.setItem("pieceData", JSON.stringify(data));
}

function rupiah(x){
    return "Rp " + Math.round(x).toLocaleString("id-ID");
}

function clearForm(){
    tanggal.value=""; mpp.value=""; target.value=""; hasil.value=""; nama.value="";
}

function namaFile(prefix){
    let now = new Date();
    return prefix + "_" + now.toISOString().slice(0,10);
}

// 🔥 FIX ANDROID DOWNLOAD
function downloadFile(content, filename, type){
    let blob = new Blob([content], { type });
    let a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = filename;

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

// CREATE
function tambahData(){
    let d = {
        tanggal: tanggal.value,
        mpp: parseInt(mpp.value),
        target: parseInt(target.value),
        hasil: parseInt(hasil.value),
        nama: nama.value
    };

    if(!d.tanggal || isNaN(d.mpp) || isNaN(d.target) || isNaN(d.hasil)){
        alert("Isi semua data!");
        return;
    }

    d.totalUang = d.hasil * hargaPerCB;
    d.perOrang = d.totalUang / d.mpp;
    d.persen = (d.hasil / d.target) * 100;

    data.push(d);
    saveData();
    tampilkan();
    clearForm();
}

// READ
function tampilkan(){
    listData.innerHTML="";
    let total=0;
    let hariSet = new Set();

    data.sort((a,b)=> new Date(a.tanggal) - new Date(b.tanggal));

    data.forEach((d,i)=>{
        total += d.perOrang;
        hariSet.add(d.tanggal);

        let warna = d.persen>=100?"#22c55e":d.persen>=90?"#facc15":"#ef4444";

        listData.innerHTML += `
        <div class="data">
        <b>${d.tanggal}</b><br>
        JML MPP: ${d.mpp}<br>
        Target: ${d.target}<br>
        Acv: ${d.hasil}<br>
        <span style="color:${warna}">Persentase: ${d.persen.toFixed(1)}%</span><br>
        Menerima: ${rupiah(d.perOrang)}

        <button class="edit" onclick="editData(${i})">✏️ Edit</button>
        <button class="hapus" onclick="hapus(${i})">Hapus</button>
        </div>`;
    });

    totalSemua.innerText = "Total Gaji : " + rupiah(total);
    totalHari.innerText = "Total Hari Kerja: " + hariSet.size + " hari";
}

// EDIT
function editData(i){
    let d=data[i];
    tanggal.value=d.tanggal;
    mpp.value=d.mpp;
    target.value=d.target;
    hasil.value=d.hasil;
    nama.value=d.nama;

    editIndex=i;
    btnTambah.style.display="none";
    btnUpdate.style.display="block";

    formInput.scrollIntoView({behavior:"smooth"});
}

// UPDATE
function updateData(){
    if(editIndex===null) return;

    let d=data[editIndex];
    d.tanggal=tanggal.value;
    d.mpp=parseInt(mpp.value);
    d.target=parseInt(target.value);
    d.hasil=parseInt(hasil.value);
    d.nama=nama.value;

    d.totalUang=d.hasil*hargaPerCB;
    d.perOrang=d.totalUang/d.mpp;
    d.persen=(d.hasil/d.target)*100;

    editIndex=null;
    btnTambah.style.display="block";
    btnUpdate.style.display="none";

    saveData();
    tampilkan();
    clearForm();
}

// DELETE
function hapus(i){
    data.splice(i,1);
    saveData();
    tampilkan();
}

// RESET
function resetData(){
    if(confirm("Hapus semua data?")){
        localStorage.removeItem("pieceData");
        data=[];
        tampilkan();
    }
}

// EXPORT
function exportTXT(){
    if(data.length===0) return alert("Data kosong!");
    let text="";
    data.forEach(d=>{
        text+=`${d.tanggal} - ${rupiah(d.perOrang)}\n`;
    });
    downloadFile(text, namaFile("rekap")+".txt", "text/plain");
}

function exportCSV(){
    if(data.length===0) return alert("Data kosong!");
    let csv="Tanggal,PerOrang\n";
    data.forEach(d=>{
        csv+=`${d.tanggal},${d.perOrang}\n`;
    });
    downloadFile(csv, namaFile("rekap")+".csv", "text/csv");
}

function exportExcel(){
    let table="<table border='1'><tr><th>Tanggal</th><th>Gaji</th></tr>";
    data.forEach(d=>{
        table+=`<tr><td>${d.tanggal}</td><td>${d.perOrang}</td></tr>`;
    });
    table+="</table>";
    downloadFile(table, namaFile("rekap")+".xls", "application/vnd.ms-excel");
}

function exportPDF(){
    let html="<h3>Rekap Piece Rate</h3>";
    data.forEach(d=>{
        html+=`${d.tanggal} - ${rupiah(d.perOrang)}<br>`;
    });
    let w=window.open("");
    w.document.write(html);
    w.print();
}

// WA
function kirimWA(){
    let text="📊 *REKAP PIECE RATE*\n\n";

    let totalGaji = 0;
    let hariSet = new Set();

    data.forEach(d=>{
        totalGaji += d.perOrang;
        hariSet.add(d.tanggal);

        text+=`📅 ${d.tanggal}
👥 Total MPP: ${d.mpp}
🗿 Nama : ${d.nama}
🎯 Target: ${d.target}
📊 Hasil: ${d.hasil}
📈 Persen: ${d.persen.toFixed(1)}%
💰 Gaji/Orang: ${rupiah(d.perOrang)}

`;
    });

    // TAMBAHAN TOTAL
    text+=`====================
💰 *TOTAL GAJI*: ${rupiah(totalGaji)}
📆 *TOTAL HARI KERJA*: ${hariSet.size} hari`;


    window.open("https://wa.me/6285862797682?text="+encodeURIComponent(text));
}



// INIT
loadData();
tampilkan();
</script>

</body>
</html>
